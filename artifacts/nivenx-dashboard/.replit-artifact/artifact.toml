kind = "web"
previewPath = "/nivenx-dashboard/"
title = "NivenX Dashboard"
version = "1.0.0"
id = "artifacts/nivenx-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nivenx-dashboard/" ]
localPort = 19135

[services.development]
run = "pnpm --filter @workspace/nivenx-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nivenx-dashboard", "run", "build" ]
publicDir = "artifacts/nivenx-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19135"
BASE_PATH = "/nivenx-dashboard/"
